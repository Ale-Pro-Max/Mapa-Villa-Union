<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Villa Unión Digital - Popup Mode</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Roboto', sans-serif; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #1a1a1a; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        
        /* Buscador Superior */
        .search-container {
            position: absolute; top: 15px; left: 0; right: 0;
            z-index: 10; display: flex; justify-content: center;
        }
        .search-box {
            width: 90%; max-width: 400px; background: white;
            padding: 12px 20px; border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none;
            font-size: 16px; outline: none;
        }

        /* Estilo del Popup Nativo */
        .maplibregl-popup-content {
            border-radius: 15px; padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            max-width: 250px !important;
        }
        .popup-title { font-weight: 700; font-size: 16px; margin-bottom: 5px; color: #202124; }
        .popup-desc { font-size: 13px; color: #5f6368; margin-bottom: 10px; line-height: 1.4; }
        .popup-link { 
            display: inline-block; background: #1a73e8; color: white; 
            padding: 8px 15px; border-radius: 18px; text-decoration: none;
            font-size: 12px; font-weight: 500; text-align: center; width: 100%;
        }

        /* Marcadores */
        .marker-emoji { font-size: 28px; cursor: pointer; transition: transform 0.2s; }
        .marker-emoji:hover { transform: scale(1.2); }

        .btn-gps {
            position: absolute; bottom: 30px; right: 20px; z-index: 10;
            background: white; border: none; width: 55px; height: 55px;
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 24px; color: #1a73e8; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar en Villa Unión..." onkeyup="filtrar()">
    </div>

    <div id="map"></div>
    <button class="btn-gps" onclick="activarGPS()">🎯</button>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: (new Date().getHours() >= 19 || new Date().getHours() < 7) ? 
                   'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json' : 
                   'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            center: [-96.9813, 18.8536], 
            zoom: 16,
            pitch: 45,
            bearing: 165, // ORIENTACIÓN 165°
            antialias: true
        });

        const lugares = [
            { nombre: "Campo Deportivo", lon: -96.9822, lat: 18.8497, icono: "🌳", desc: "Principal centro recreativo de Villa Unión.", cat: "deporte" },
            { nombre: "Centro de Salud", lon: -96.9808, lat: 18.8497, icono: "🏥", desc: "Servicios médicos y urgencias básicas.", cat: "salud" },
            { nombre: "Taquitos Villa Unión", lon: -96.9831, lat: 18.8570, icono: "🌮", desc: "Los mejores tacos al pastor y de tripa.", cat: "comida" }
        ];

        const marcadores = [];

        lugares.forEach(l => {
            // Crear el elemento visual (Emoji)
            const el = document.createElement('div');
            el.className = 'marker-emoji';
            el.innerHTML = l.icono;

            // Crear el Popup Nativo
            const popup = new maplibregl.Popup({ offset: 25, closeButton: false })
                .setHTML(`
                    <div class="popup-title">${l.nombre}</div>
                    <div class="popup-desc">${l.desc}</div>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lon}" target="_blank" class="popup-link">🚗 Cómo llegar</a>
                `);

            // Agregar marcador al mapa
            const m = new maplibregl.Marker(el)
                .setLngLat([l.lon, l.lat])
                .setPopup(popup) // Vincula el popup directamente al marcador
                .addTo(map);

            m.nombre = l.nombre.toLowerCase();
            marcadores.push(m);
        });

        // Filtrado por texto
        function filtrar() {
            const val = document.getElementById('buscador').value.toLowerCase();
            marcadores.forEach(m => {
                m.getElement().style.display = m.nombre.includes(val) ? 'block' : 'none';
            });
        }

        // GPS con Emoji de Usuario
        let userMarker = null;
        function activarGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                const { longitude, latitude } = pos.coords;
                if (userMarker) {
                    userMarker.setLngLat([longitude, latitude]);
                } else {
                    const userEl = document.createElement('div');
                    userEl.className = 'marker-emoji';
                    userEl.innerHTML = '👤';
                    userMarker = new maplibregl.Marker(userEl).setLngLat([longitude, latitude]).addTo(map);
                }
                map.flyTo({ center: [longitude, latitude], zoom: 17 });
            }, () => alert("Por favor, activa el GPS"));
        }

        // Configuración para que el mapa se sienta fluido
        map.addControl(new maplibregl.NavigationControl(), 'top-right');
    </script>
</body>
</html>
