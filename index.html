<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Villa Unión Digital - Mapa de Servicios</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { margin: 0; padding: 0; background: #f4f4f4; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Buscador Superior */
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 85%; max-width: 400px;
        }
        #buscador {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 14px; outline: none;
        }

        /* Botón GPS Flotante */
        .btn-gps {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: #007bff; color: white; width: 55px; height: 55px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 2px solid white; transition: 0.3s;
        }
        .btn-gps:active { transform: scale(0.9); }

        /* Estilo de los Popups */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .leaflet-popup-content b { font-size: 16px; color: #007bff; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="🔍 Buscar puesto o lugar..." onkeyup="filtrarPuestos()">
    </div>

    <div id="map"></div>
    <button class="btn-gps" onclick="centrarMapa()">📍</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Inicializar Mapa
        var map = L.map('map', { zoomControl: false }).setView([18.8536, -96.9813], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© Villa Unión Digital'
        }).addTo(map);

        // 2. Definir Iconos Personalizados
        var IconoComida = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2819/2819194.png', iconSize: [35, 35] });
        var IconoSalud = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png', iconSize: [35, 35] });
        var IconoDeporte = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/4433/4433714.png', iconSize: [35, 35] });
        var IconoDefault = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize: [30, 30] });

        // 3. Base de Datos de Puestos
        var puestos = [
            { nombre: "Campo Deportivo Villa Unión", lat: 18.8497, lng: -96.9822, info: "Espacio recreativo, canchas y eventos.", cat: "deporte" },
            { nombre: "Centro de Salud Villa Union", lat: 18.8488, lng: -96.9814, info: "Atención médica preventiva de primer nivel.", cat: "salud" },
            { nombre: "Taquitos Villa Unión", lat: 18.8570, lng: -96.9831, info: "Cenas tradicionales los fines de semana.", cat: "comida" }
        ];

        var marcadores = [];

        // 4. Función para crear marcadores con iconos según categoría
        puestos.forEach(function(p) {
            var miIcono;
            if(p.cat == "comida") miIcono = IconoComida;
            else if(p.cat == "salud") miIcono = IconoSalud;
            else if(p.cat == "deporte") miIcono = IconoDeporte;
            else miIcono = IconoDefault;

            var m = L.marker([p.lat, p.lng], { icon: miIcono }).addTo(map)
                     .bindPopup("<b>" + p.nombre + "</b><br>" + p.info);
            
            m.nombrePuesto = p.nombre.toLowerCase(); // Para el buscador
            marcadores.push(m);
        });

        // 5. Función del Buscador
        function filtrarPuestos() {
            var filtro = document.getElementById('buscador').value.toLowerCase();
            marcadores.forEach(function(m) {
                if(m.nombrePuesto.indexOf(filtro) > -1) {
                    map.addLayer(m);
                } else {
                    map.removeLayer(m);
                }
            });
        }

        // 6. GPS - Modo Profesional
        var marcadorUsuario = L.circleMarker([0,0], {
            radius: 9, fillColor: "#007bff", color: "white", weight: 3, opacity: 1, fillOpacity: 1
        }).addTo(map);

        map.on('locationfound', function(e) {
            marcadorUsuario.setLatLng(e.latlng);
        });

        setInterval(() => { map.locate({setView: false}); }, 5000);
        map.locate({setView: false});

        function centrarMapa() {
            map.locate({setView: true, maxZoom: 17});
        }
    </script>
</body>
</html>
